    // --- MAIN APP COMPONENT ---

    function NegotiationApp() {
      const [appStage, setAppStage] = useState('welcome'); 
      const [currentQuestionIdx, setCurrentQuestionIdx] = useState(0);
      const [scores, setScores] = useState({
        [SKILL_TYPES.EMPATHY]: 0,
        [SKILL_TYPES.ASSERTIVENESS]: 0,
        [SKILL_TYPES.STRATEGY]: 0,
        [SKILL_TYPES.OBJECTIONS]: 0,

      });

      const [currentStepId, setCurrentStepId] = useState(null);
      const [simHistory, setSimHistory] = useState([]);
      const [simScore, setSimScore] = useState(0);
      const [isSimFinished, setIsSimFinished] = useState(false);
      
      const chatEndRef = useRef(null);

      useEffect(() => {
        if (appStage === 'simulation') {
          chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
        }
      }, [simHistory, appStage]);

      const handleAnswer = (option) => {
        setScores(prev => ({
          ...prev,
          [option.type]: prev[option.type] + option.score
        }));

        if (currentQuestionIdx < DIAGNOSTIC_QUESTIONS.length - 1) {
          setCurrentQuestionIdx(prev => prev + 1);
        } else {
          setAppStage('results');
        }
      };

      const getWeakestSkills = () => {
        const minScore = Math.min(...Object.values(scores));
        return Object.keys(scores).filter(key => scores[key] === minScore);
      };

      const startSimulation = (scenarioId) => {
        setSelectedScenarioId(scenarioId);
        const scenario = SIMULATION_SCENARIOS[scenarioId];
        setCurrentStepId(scenario.startStep);
        setSimHistory([]);
        setSimScore(0);
        setIsSimFinished(false);
        setAppStage('simulation');
      };

      const handleSimChoice = (option) => {
        const scenario = SIMULATION_SCENARIOS[selectedScenarioId];
        const currentStep = scenario.steps[currentStepId];

        const newHistory = [
          ...simHistory,
          { role: 'npc', text: currentStep.npcText },
          { role: 'user', text: option.text, feedback: option.feedback, score: option.score }
        ];
        
        setSimHistory(newHistory);
        setSimScore(prev => prev + option.score);

        if (option.next && scenario.steps[option.next]) {
           setCurrentStepId(option.next);
           const nextStep = scenario.steps[option.next];
           if (!nextStep.options || nextStep.options.length === 0) {
             setTimeout(() => {
                setSimHistory(prev => [...prev, { role: 'npc', text: nextStep.npcText }]);
                setIsSimFinished(true);
             }, 600);
           }
        } else {
          setIsSimFinished(true);
        }
      };

      const restart = () => {
        setAppStage('welcome');
        setCurrentQuestionIdx(0);
        setScores({ empathy: 0, assertiveness: 0, strategy: 0, objections: 0, argumentation: 0 });
        setCurrentStepId(null);
        setSimHistory([]);
        setSimScore(0);
        setSelectedScenarioId(null);
        setIsSimFinished(false);
      };

      const retrySimulation = () => {
        setAppStage('scenario_selection');
        setCurrentStepId(null);
        setSimHistory([]);
        setSimScore(0);
        setSelectedScenarioId(null);
        setIsSimFinished(false);
      };

              {/* History */}
              {simHistory.map((msg, idx) => (
                <div key={idx} className={`flex flex-col ${msg.role === 'user' ? 'items-end' : 'items-start'} mb-4`}> 
                  <div className={`max-w-[85%] rounded-3xl p-5 shadow-sm relative ${
                    msg.role === 'user' 
                      ? 'bg-emerald-600 text-white rounded-tr-sm' 
                      : 'bg-white text-stone-800 rounded-tl-sm border border-stone-100'
                  }`}>
                    <p className="leading-relaxed text-lg">{msg.text}</p>
                  </div>
                  
                  {msg.role === 'user' && msg.feedback && (
                      <div className="mt-2 mr-2 flex items-center gap-2 text-stone-400 text-sm font-medium animate-fadeIn">
                        <div className="bg-white border border-emerald-200 text-emerald-700 px-3 py-1 rounded-full text-xs flex items-center gap-1.5 shadow-sm">
                           <i className="fa-solid fa-arrow-trend-up"></i>
                           {msg.feedback}
                        </div>
                      </div>
                  )}
                </div>
              ))}

              {/* NPC Pending */}
              {!isSimFinished && (
                <div className="flex justify-start animate-fadeIn">
                   <div className="max-w-[85%] bg-white text-stone-800 shadow-sm rounded-3xl rounded-tl-sm border border-stone-100 p-5">
                     <div className="flex items-center gap-2 mb-2">
                       <div className="w-8 h-8 rounded-full bg-stone-200 flex items-center justify-center">
                         <i className="fa-solid fa-user text-stone-500 text-sm"></i>
                       </div>
                       <span className="text-xs font-bold text-stone-400 uppercase">{scenario.opponent}</span>
                     </div>
                     <p className="leading-relaxed text-lg">{currentStepData.npcText}</p>
                   </div>
                </div>
              )}
              <div ref={chatEndRef} />
            </div>

            {/* Controls */}
            <div className="p-5 bg-white border-t border-stone-100">
              {!isSimFinished ? (
                <div>
                  <p className="text-xs font-bold text-stone-400 uppercase mb-3 ml-1">Ваш ответ:</p>
                  <div className="space-y-3">
                    {currentStepData.options.map((opt, idx) => (
                      <button
                        key={idx}
                        onClick={() => handleSimChoice(opt)}
                        className="w-full text-left p-4 text-base rounded-2xl border-2 border-stone-100 hover:border-orange-400 hover:bg-orange-50 transition-all duration-200 text-stone-700 font-medium active:scale-[0.98]"
                      >
                        {opt.text}
                      </button>
                    ))}
                  </div>
                </div>
              ) : (
                 <div className="flex flex-col items-center gap-4 py-4">
                   <div className="text-stone-400 font-medium italic">Диалог завершен</div>
                   <Button onClick={() => setAppStage('feedback')} className="w-full md:w-auto text-lg shadow-orange-200">
                     Перейти к результатам <i className="fa-solid fa-arrow-right ml-2 text-xl"></i>
                   </Button>
                 </div>
              )}
            </div>
          </div>
        );
      };

      const FeedbackView = () => {
        const scenario = SIMULATION_SCENARIOS[selectedScenarioId];
        const maxScore = scenario ? scenario.maxScore : 30;
        const percentage = Math.min(100, Math.round((simScore / maxScore) * 100)); 
        
        const userMoves = simHistory.filter(m => m.role === 'user');

        let feedbackTitle = "";
        let feedbackMsg = "";

        if (percentage >= 80) {
          feedbackTitle = "Ты - Гуру!";
          feedbackMsg = "Блестящая работа! Интересы защищены, отношения сохранены.";
        } else if (percentage >= 40) {
          feedbackTitle = "Хорошо!";
          feedbackMsg = "Неплохой результат, но можно было сыграть тоньше в паре моментов.";
        } else {
          feedbackTitle = "Нужна тренировка";
          feedbackMsg = "Переговоры пошли не по плану. Попробуй еще раз!";
        }

        return (
          <div className="max-w-2xl mx-auto w-full animate-fadeIn">
            <div className="text-center mb-10">
              <div className="inline-block p-6 bg-white rounded-full shadow-lg shadow-orange-100 mb-6 animate-bounce-slow">
                 {percentage >= 80 ? <i className="fa-solid fa-award text-7xl text-yellow-400"></i> : <i className="fa-solid fa-rotate-right text-7xl text-orange-400"></i>}
              </div>
              <h2 className="text-4xl font-extrabold text-stone-800 mb-3">{feedbackTitle}</h2>
              <p className="text-xl text-stone-500 mb-8">{feedbackMsg}</p>
              
              <div className="grid grid-cols-2 gap-6 max-w-lg mx-auto text-left">
                 <Card className="bg-white border-2 border-stone-100 p-5 flex flex-col justify-center">
                   <div className="text-xs font-bold text-stone-400 uppercase mb-2">Фокус обучения</div>
                   <div className="font-bold text-orange-600 text-lg leading-tight">
                     {getWeakestSkills().map(skill => LEARNING_MODULES[skill].title).join(', ')}
                   </div>
                 </Card>
                 <Card className="bg-emerald-50 border-2 border-emerald-100 p-5 flex flex-col justify-center">
                   <div className="text-xs font-bold text-emerald-600/60 uppercase mb-2">Ваш счет</div>
                   <div className="font-extrabold text-emerald-600 text-3xl">{simScore} <span className="text-lg text-emerald-600/60">/ {maxScore}</span></div>
                 </Card>
              </div>
            </div>

            <div className="bg-white rounded-3xl border border-stone-200 shadow-sm p-8 mb-10">
                <h3 className="text-2xl font-bold text-stone-800 mb-8 flex items-center gap-3">
                    <i className="fa-solid fa-book-open text-orange-500 text-2xl"></i>
                    Разбор полетов
                </h3>
                <div className="space-y-8">
                    {userMoves.map((move, idx) => (
                        <div key={idx} className="relative pl-10 border-l-4 border-stone-100 last:border-0 pb-2">
                            <div className={`absolute -left-[11px] top-0 w-5 h-5 rounded-full border-4 bg-white flex items-center justify-center ${
                                 move.score >= 8 ? 'border-emerald-400' :
                                 move.score >= 5 ? 'border-amber-400' :
                                 'border-rose-400'
                            }`} />
                            
                            <div className="mb-3 flex items-center gap-3">
                               <span className="text-xs font-extrabold uppercase tracking-wider text-stone-400">Ход {idx + 1}</span>
                               {move.score >= 8 && <span className="px-2 py-1 rounded-lg text-xs font-bold bg-emerald-100 text-emerald-700 flex items-center gap-1"><i className="fa-solid fa-check text-xs"></i> Супер</span>}
                               {move.score <= 4 && <span className="px-2 py-1 rounded-lg text-xs font-bold bg-rose-100 text-rose-700 flex items-center gap-1"><i className="fa-solid fa-circle-xmark text-xs"></i> Ошибка</span>}
                            </div>

                            <div className="bg-stone-50 rounded-xl p-5 mb-3 border border-stone-100">
                                <p className="text-stone-700 font-medium italic text-lg">"{move.text}"</p>
                            </div>

                            <div className={`flex items-start gap-2 text-sm font-medium ${
                                move.score >= 8 ? 'text-emerald-600' :
                                move.score >= 5 ? 'text-amber-600' :
                                'text-rose-600'
                            }`}>
                                 <i className="fa-solid fa-arrow-trend-up mt-1 shrink-0"></i>
                                 <span className="text-base">{move.feedback}</span>
                            </div>
                        </div>
                    ))}
                </div>
            </div>

            <div className="flex flex-col sm:flex-row justify-center gap-4 text-center">
              <Button onClick={retrySimulation} variant="secondary" className="w-full sm:w-auto">
                Выбрать другой сценарий
              </Button>
              <Button onClick={restart} variant="outline" className="w-full sm:w-auto">
                <i className="fa-solid fa-rotate-right text-lg"></i> Начать заново
              </Button>
            </div>
          </div>
        );
      };

      return (
        <>
          <div className="min-h-screen font-sans text-stone-800 selection:bg-orange-200 selection:text-orange-900 pb-12">
            <nav className="bg-white/80 backdrop-blur-md border-b border-stone-200 sticky top-0 z-50">
              <div className="max-w-5xl mx-auto px-4 h-20 flex items-center justify-between">
                <div className="flex items-center gap-3 font-extrabold text-2xl text-orange-600 cursor-pointer hover:opacity-80 transition-opacity" onClick={() => setAppStage('welcome')}>
                  <div className="bg-orange-100 p-2 rounded-xl flex items-center justify-center">
                    <i className="fa-solid fa-briefcase text-xl"></i>
                  </div>
                  <span>Negotiator Pro</span>
                </div>
                {appStage !== 'welcome' && (
                  <div className="hidden md:block text-xs font-bold px-4 py-2 bg-stone-100 rounded-xl text-stone-500 uppercase tracking-wide">
                    {appStage === 'test' && 'Диагностика'}
                    {appStage === 'results' && 'Результаты'}
                    {appStage === 'learning' && 'Обучение'}
                    {appStage === 'scenario_selection' && 'Выбор'}
                    {appStage === 'simulation' && 'Практика'}
                    {appStage === 'feedback' && 'Финиш'}
                  </div>
                )}
              </div>
            </nav>

            <main className="max-w-5xl mx-auto px-4 py-10 flex flex-col items-center">
              {appStage === 'welcome' && <WelcomeView />}
              {appStage === 'test' && <TestView />}
              {appStage === 'results' && <ResultsView />}
              {appStage === 'learning' && <LearningView />}
              {appStage === 'scenario_selection' && <ScenarioSelectionView />}
              {appStage === 'simulation' && <SimulationView />}
              {appStage === 'feedback' && <FeedbackView />}
            </main>
          </div>

          {/* ФИКСИРОВАННЫЙ БЕЖЕВЫЙ БЛОК С ПОДПИСЬЮ И КОНТАКТАМИ */}
          <div className="bg-amber-50 border-t border-amber-200 py-5 px-4 text-center shadow-inner">
            <div className="max-w-5xl mx-auto flex flex-col sm:flex-row justify-center items-center gap-2 sm:gap-6 text-amber-800 text-sm md:text-base font-medium">
              <span className="inline-flex items-center gap-2">
                <i className="fa-regular fa-heart text-amber-500"></i>
                Сделано Натальей Дитловой с любовью к коллегам.
              </span>
              <span className="hidden sm:inline text-amber-300">|</span>
              <span className="inline-flex items-center gap-2">
                <i className="fa-regular fa-envelope text-amber-500"></i>
                Хотите тренажер под свою задачу, обращайтесь: 
                <a href="mailto:ditlova@mail.ru" className="text-amber-700 underline decoration-amber-300 hover:text-amber-900 hover:decoration-amber-600 transition-colors font-semibold">
                  ditlova@mail.ru
                </a>
              </span>
            </div>
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NegotiationApp />);
  </script>
</body>
</html>
